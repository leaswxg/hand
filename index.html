<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hand Skeleton · Draw</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
            overflow: hidden;
        }

        /* video hidden – only used for tracking */
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* main canvas – black bg + skeleton + drawing */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            touch-action: none;
            background: #000;
            transform: scaleX(-1);
        }

        /* status / prompt overlay */
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            color: rgba(0, 255, 200, 0.6);
            font-size: clamp(28px, 8vw, 56px);
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 60px rgba(0, 255, 200, 0.15), 0 0 120px rgba(0, 255, 200, 0.05);
            transition: opacity 0.6s ease;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #status.hidden {
            opacity: 0;
        }
        #status .sub {
            font-size: clamp(12px, 2.5vw, 18px);
            opacity: 0.4;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: 300;
        }

        /* small fps counter */
        #fps-display {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 5;
            color: rgba(0, 255, 200, 0.25);
            font-size: clamp(10px, 1.8vw, 13px);
            font-family: 'SF Mono', 'Menlo', monospace;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 200, 0.06);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 0.5px;
        }

        /* bottom toolbar – safe area aware */
        #toolbar {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom, 20px));
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 20px);
            padding: 0 clamp(12px, 4vw, 30px);
            flex-wrap: wrap;
            pointer-events: none;
        }

        #toolbar button {
            pointer-events: auto;
            background: rgba(0, 255, 200, 0.08);
            border: 1px solid rgba(0, 255, 200, 0.2);
            color: #aaffee;
            padding: clamp(10px, 2.5vw, 16px) clamp(18px, 4vw, 32px);
            border-radius: 50px;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.05);
            transition: all 0.2s ease;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.15);
            cursor: pointer;
            touch-action: manipulation;
            min-height: 50px;
            min-width: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex: 0 1 auto;
            white-space: nowrap;
        }

        #toolbar button:active {
            transform: scale(0.94);
            background: rgba(0, 255, 200, 0.18);
        }

        #toolbar button.active {
            background: rgba(255, 80, 120, 0.2);
            border-color: rgba(255, 80, 120, 0.35);
            color: #ffaabb;
            box-shadow: 0 0 40px rgba(255, 80, 120, 0.08);
        }

        #toolbar button.clear-btn {
            background: rgba(255, 60, 60, 0.08);
            border-color: rgba(255, 60, 60, 0.15);
            color: #ff8888;
        }
        #toolbar button.clear-btn:active {
            background: rgba(255, 60, 60, 0.2);
        }

        #toolbar button .icon {
            font-size: clamp(16px, 3.2vw, 22px);
            line-height: 1;
        }

        /* loading screen */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaffee;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            transition: opacity 0.8s ease;
        }
        #loading .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 255, 200, 0.08);
            border-top: 3px solid #00ffc8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }
        #loading .sub {
            font-size: 13px;
            opacity: 0.4;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* responsive tweaks */
        @media (max-width: 480px) {
            #toolbar {
                gap: 8px;
                padding: 0 10px;
                bottom: max(14px, env(safe-area-inset-bottom, 14px));
            }
            #toolbar button {
                min-height: 44px;
                min-width: 60px;
                padding: 8px 14px;
                font-size: 12px;
                border-radius: 40px;
            }
            #toolbar button .icon {
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            #toolbar button {
                min-height: 38px;
                min-width: 50px;
                padding: 6px 10px;
                font-size: 10px;
                border-radius: 30px;
            }
            #toolbar button .icon {
                font-size: 12px;
            }
        }

        @supports (padding: max(0px)) {
            #toolbar {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                bottom: max(20px, env(safe-area-inset-bottom, 20px));
            }
        }
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="loading">
        <div class="spinner"></div>
        <div>INITIALIZING</div>
        <div class="sub">camera &amp; hand model</div>
    </div>

    <!-- MAIN -->
    <div id="container">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>

        <!-- "show hand" prompt -->
        <div id="status">
            SHOW HAND
            <div class="sub">raise your palm to the camera</div>
        </div>

        <div id="fps-display">-- FPS</div>

        <!-- TOOLBAR -->
        <div id="toolbar">
            <button id="btn-skeleton" class="active">
                <span class="icon">👋</span> SKELETON
            </button>
            <button id="btn-draw" class="active">
                <span class="icon">✏️</span> DRAW
            </button>
            <button id="btn-clear" class="clear-btn">
                <span class="icon">🗑️</span> CLEAR
            </button>
        </div>
    </div>

    <!-- ===== MEDIAPIPE CDN ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
    </script>

    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const CFG = {
            maxLinePoints: 220,
            pointLifetime: 2600,
            glowColor: '#00ffc8',
            glowSize: 20,
            skeletonColor: '#00ffc8',
            skeletonGlow: 'rgba(0,255,200,0.2)',
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const fpsEl = document.getElementById('fps-display');
        const loadingEl = document.getElementById('loading');

        const btnSkeleton = document.getElementById('btn-skeleton');
        const btnDraw = document.getElementById('btn-draw');
        const btnClear = document.getElementById('btn-clear');

        // ============================================================
        //  STATE
        // ============================================================
        let showSkeleton = true;
        let drawMode = true;
        let drawPoints = [];
        let lastDrawPoint = null;

        let latestHandData = null; // { landmarks, handedness }
        let handDetected = false;

        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        let currentFps = 0;

        let camera = null;
        let isRunning = false;
        let renderId = null;

        // ============================================================
        //  CANVAS SIZING (devicePixelRatio aware)
        // ============================================================
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ============================================================
        //  DRAWING HELPERS
        // ============================================================

        /** Draw a glowing line from stored points (fading) */
        function drawGlowingLine() {
            const now = performance.now();
            // remove expired
            drawPoints = drawPoints.filter(p => (now - p.t) < CFG.pointLifetime);
            while (drawPoints.length > CFG.maxLinePoints) drawPoints.shift();

            if (drawPoints.length < 2) return;

            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            const pts = drawPoints;

            for (let i = 1; i < pts.length; i++) {
                const p0 = pts[i - 1],
                    p1 = pts[i];
                const age0 = (now - p0.t) / CFG.pointLifetime;
                const age1 = (now - p1.t) / CFG.pointLifetime;
                const alpha = Math.max(0, (1 - (age0 + age1) / 2));

                if (alpha < 0.01) continue;

                const baseW = 2 + 3 * alpha;
                const glowW = CFG.glowSize * alpha;

                // outer glow
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.strokeStyle = `rgba(0,255,200,${alpha * 0.12})`;
                ctx.lineWidth = glowW * 2.2;
                ctx.shadowColor = CFG.glowColor;
                ctx.shadowBlur = glowW * 2.5;
                ctx.stroke();

                // inner glow
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.strokeStyle = `rgba(0,255,200,${alpha * 0.35})`;
                ctx.lineWidth = glowW * 0.8;
                ctx.shadowBlur = glowW * 1.2;
                ctx.stroke();

                // core
                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                const hue = 170 + 25 * (1 - alpha);
                ctx.strokeStyle = `hsla(${hue}, 100%, 72%, ${alpha * 0.9})`;
                ctx.lineWidth = baseW;
                ctx.shadowBlur = 0;
                ctx.stroke();
                ctx.restore();

                // glow dots
                if (i === pts.length - 1 || i % 2 === 0) {
                    const da = Math.max(0, 1 - age1) * 0.7;
                    if (da > 0.04) {
                        ctx.save();
                        const r = 2 + 4 * (1 - age1);
                        const grad = ctx.createRadialGradient(p1.x, p1.y, 0, p1.x, p1.y, r * 5);
                        grad.addColorStop(0, `rgba(0,255,200,${da * 0.85})`);
                        grad.addColorStop(0.4, `rgba(0,255,200,${da * 0.3})`);
                        grad.addColorStop(1, `rgba(0,255,200,0)`);
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(p1.x, p1.y, r * 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                }
            }

            // bright tip
            if (pts.length > 0) {
                const last = pts[pts.length - 1];
                const age = (performance.now() - last.t) / CFG.pointLifetime;
                if (age < 0.5) {
                    ctx.save();
                    const r = 6 + 12 * (1 - age);
                    const grad = ctx.createRadialGradient(last.x, last.y, 0, last.x, last.y, r);
                    grad.addColorStop(0, `rgba(200, 255, 245, 0.95)`);
                    grad.addColorStop(0.25, `rgba(0, 255, 200, 0.6)`);
                    grad.addColorStop(1, `rgba(0, 255, 200, 0)`);
                    ctx.fillStyle = grad;
                    ctx.shadowColor = CFG.glowColor;
                    ctx.shadowBlur = 40;
                    ctx.beginPath();
                    ctx.arc(last.x, last.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        /** Draw hand skeleton with glow */
        function drawHandSkeleton(landmarks, isLeft) {
            if (!landmarks) return;
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;

            const pts = landmarks.map(l => ({ x: l.x * w, y: l.y * h }));

            const color = isLeft ? '#ff6b9d' : '#00ffc8';
            const glow = isLeft ? 'rgba(255,80,150,0.2)' : 'rgba(0,255,200,0.2)';

            const connections = [
                [0, 1],
                [1, 2],
                [2, 3],
                [3, 4],
                [0, 5],
                [5, 6],
                [6, 7],
                [7, 8],
                [5, 9],
                [9, 10],
                [10, 11],
                [11, 12],
                [9, 13],
                [13, 14],
                [14, 15],
                [15, 16],
                [13, 17],
                [17, 18],
                [18, 19],
                [19, 20],
                [0, 17]
            ];

            // glow underlay
            ctx.save();
            for (const [i, j] of connections) {
                const p1 = pts[i],
                    p2 = pts[j];
                if (!p1 || !p2) continue;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = glow;
                ctx.lineWidth = 14;
                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.stroke();
            }
            ctx.restore();

            // main lines
            ctx.save();
            for (const [i, j] of connections) {
                const p1 = pts[i],
                    p2 = pts[j];
                if (!p1 || !p2) continue;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.8;
                ctx.shadowColor = color;
                ctx.shadowBlur = 14;
                ctx.stroke();
            }
            ctx.restore();

            // joints
            ctx.save();
            for (let i = 0; i < pts.length; i++) {
                const p = pts[i];
                if (!p) continue;
                const isTip = [4, 8, 12, 16, 20].includes(i);
                const radius = isTip ? 5.5 : 4;
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 4);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.3, color);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.shadowColor = color;
                ctx.shadowBlur = 24;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = isTip ? '#ffffff' : color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // ============================================================
        //  RENDER LOOP (decoupled from detection)
        // ============================================================
        function render() {
            const dpr = window.devicePixelRatio || 1;
            const w = canvas.width / dpr;
            const h = canvas.height / dpr;

            // black bg
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            // draw hand skeleton if available
            if (handDetected && latestHandData && showSkeleton) {
                const landmarks = latestHandData.landmarks;
                const isLeft = latestHandData.handedness === 'Left';
                drawHandSkeleton(landmarks, isLeft);
            }

            // draw glowing line
            if (drawMode && drawPoints.length > 1) {
                drawGlowingLine();
            }

            // update fps
            frameCount++;
            const now = performance.now();
            if (now - lastFpsUpdate > 400) {
                currentFps = Math.round(frameCount / ((now - lastFpsUpdate) / 1000));
                frameCount = 0;
                lastFpsUpdate = now;
                fpsEl.textContent = currentFps + ' FPS';
            }

            renderId = requestAnimationFrame(render);
        }

        // ============================================================
        //  MEDIAPIPE HANDS
        // ============================================================
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.65,
            minTrackingConfidence: 0.6,
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // use the first hand
                const idx = 0;
                const landmarks = results.multiHandLandmarks[idx];
                const handedness = results.multiHandedness && results.multiHandedness[idx] ?
                    results.multiHandedness[idx].label :
                    'Right';

                latestHandData = { landmarks, handedness };
                handDetected = true;

                // hide "show hand" text
                statusEl.classList.add('hidden');

                // handle drawing from index finger tip (landmark 8)
                if (drawMode && landmarks && landmarks.length > 8) {
                    const dpr = window.devicePixelRatio || 1;
                    const w = canvas.width / dpr;
                    const h = canvas.height / dpr;
                    const tip = landmarks[8];
                    const x = tip.x * w;
                    const y = tip.y * h;
                    if (x > 0 && x < w && y > 0 && y < h) {
                        const now2 = performance.now();
                        if (!lastDrawPoint || (now2 - lastDrawPoint.t) > 16) {
                            drawPoints.push({ x, y, t: now2 });
                            lastDrawPoint = { x, y, t: now2 };
                            while (drawPoints.length > CFG.maxLinePoints + 30) {
                                drawPoints.shift();
                            }
                        }
                    }
                }
            } else {
                handDetected = false;
                latestHandData = null;
                // show "show hand" text
                statusEl.classList.remove('hidden');
            }
        });

        // ============================================================
        //  CAMERA
        // ============================================================
        function initCamera() {
            const cam = new Camera(video, {
                onFrame: async () => {
                    try {
                        await hands.send({ image: video });
                    } catch (_) { /* ignore */ }
                },
                width: 640,
                height: 480,
                facingMode: 'user',
            });
            return cam;
        }

        // ============================================================
        //  UI CONTROLS
        // ============================================================
        btnSkeleton.addEventListener('click', () => {
            showSkeleton = !showSkeleton;
            btnSkeleton.classList.toggle('active');
            btnSkeleton.innerHTML = showSkeleton ?
                '<span class="icon">👋</span> SKELETON' :
                '<span class="icon">👋</span> OFF';
        });

        btnDraw.addEventListener('click', () => {
            drawMode = !drawMode;
            btnDraw.classList.toggle('active');
            btnDraw.innerHTML = drawMode ?
                '<span class="icon">✏️</span> DRAW' :
                '<span class="icon">✏️</span> OFF';
            if (!drawMode) {
                // clear points when turning off
                drawPoints = [];
                lastDrawPoint = null;
            }
        });

        btnClear.addEventListener('click', () => {
            drawPoints = [];
            lastDrawPoint = null;
            // haptic feedback if available
            if (navigator.vibrate) navigator.vibrate(10);
        });

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            try {
                statusEl.textContent = 'SHOW HAND';
                statusEl.classList.remove('hidden');

                camera = initCamera();
                await camera.start();

                isRunning = true;
                loadingEl.classList.add('hidden');
                setTimeout(() => { loadingEl.style.display = 'none'; }, 600);

                // start render loop
                render();

            } catch (err) {
                console.error('Init error:', err);
                statusEl.textContent = '⚠️ CAMERA ERROR';
                statusEl.classList.remove('hidden');
                loadingEl.innerHTML = `
              <div style="color:#ff6b6b;font-size:40px;margin-bottom:16px;">⚠️</div>
              <div style="color:#ff6b6b;font-size:18px;">Camera access failed</div>
              <div class="sub" style="color:#ff6b6b;opacity:0.7;max-width:300px;text-align:center;margin-top:12px;line-height:1.5;">
                ${err.message || 'Please allow camera access and reload.'}
              </div>
              <button onclick="location.reload()" style="margin-top:24px;padding:14px 36px;background:rgba(255,100,100,0.15);border:1px solid rgba(255,100,100,0.25);border-radius:40px;color:#ff8a8a;font-size:16px;cursor:pointer;touch-action:manipulation;">
                🔄 Reload
              </button>
            `;
            }
        }

        // visibility change – pause/resume
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && camera) {
                // pause if needed
            } else if (!document.hidden && camera) {
                // resume
            }
        });

        window.addEventListener('beforeunload', () => {
            if (camera) {
                try { camera.stop(); } catch (_) {}
            }
            if (renderId) {
                cancelAnimationFrame(renderId);
            }
        });

        // start
        init();

        // ============================================================
        //  MOBILE SHORTCUTS: double-tap canvas toggles draw
        // ============================================================
        let lastTap = 0;
        canvas.addEventListener('touchend', (e) => {
            const now2 = Date.now();
            if (now2 - lastTap < 400) {
                btnDraw.click();
                e.preventDefault();
            }
            lastTap = now2;
        });

        // long-press toggles skeleton
        let longPressTimer = null;
        canvas.addEventListener('touchstart', () => {
            longPressTimer = setTimeout(() => {
                btnSkeleton.click();
                longPressTimer = null;
            }, 700);
        });
        canvas.addEventListener('touchend', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });
        canvas.addEventListener('touchmove', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });

        console.log('🖐️ Hand Skeleton + Draw loaded');
